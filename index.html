<!DOCTYPE html>
<html>
<head>
    <title>Gabiley Transport System</title>
    <style>
        /* This makes it responsive and clean */
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; display: block; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Gabiley Transport</h2>
        
        <!-- Inputs for the system -->
        <input type="text" id="driverName" placeholder="Enter Driver Name">
        
        <select id="routeSelect">
            <option value="Gabiley to Hargeisa">Gabiley to Hargeisa</option>
            <option value="Gabiley to Wajaale">Gabiley to Wajaale</option>
        </select>

        <button onclick="recordTrip()">Record Trip</button>

        <!-- Where the result shows up -->
        <h3 id="displayArea"></h3>
    </div>

    <script>
        function recordTrip() {
            // 1. Get values from the inputs
            // Note: IDs are case-sensitive (must match exactly)
            let driver = document.getElementById("driverName").value;
            let route = document.getElementById("routeSelect").value;

            // 2. Simple logic to check if input is empty
            if (driver === "") {
                alert("Please enter a driver name");
                return;
            }

            // 3. Display the result on the screen (the "Live" part)
            document.getElementById("displayArea").innerHTML = 
                "Trip Registered: " + driver + " is driving to " + route;

            // 4. Console log (Good for showing teachers you know debugging)
            console.log("Trip saved for: " + driver);
        }
    </script>

</body>
</html>
